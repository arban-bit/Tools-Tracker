<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolkit Manager - Vestas V236</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-top">
      <div class="header-logo">
        <img src="img/vestas-logo.jpg" alt="Vestas" class="logo-icon">
        <div>
          <h1>Toolkit Manager</h1>
          <div class="subtitle">Edit toolkit templates per wind farm</div>
        </div>
      </div>
    </div>
  </header>

  <nav class="nav-links">
    <a href="index.html">Toolkit Checker</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="qr-codes.html">QR Codes</a>
    <a href="toolkit-manager.html" class="active">Toolkit Manager</a>
  </nav>

  <div class="container" style="padding-bottom: 40px;">

    <!-- Template Selector -->
    <div class="card">
      <div class="card-header">
        <h2>Select Template</h2>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label for="template-select">Toolkit Template</label>
          <select id="template-select">
            <option value="">— Select a template —</option>
          </select>
          <small style="color: var(--vestas-gray); display: block; margin-top: 4px;">
            Templates are shared across wind farms that reference them.
          </small>
        </div>

        <div id="template-info" style="display: none; margin-top: 12px;">
          <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
            <div class="stat-card">
              <div class="stat-value" id="info-drawers">0</div>
              <div class="stat-label">Drawers</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="info-items">0</div>
              <div class="stat-label">Items</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="info-farms">0</div>
              <div class="stat-label">Farms Using</div>
            </div>
          </div>
          <div id="info-farms-list" style="margin-top: 8px; font-size: 13px; color: var(--vestas-gray);"></div>
          <div id="info-custom-badge" style="margin-top: 8px; display: none;">
            <span style="background: var(--vestas-blue); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px;">CUSTOMISED</span>
            <button class="btn btn-outline" id="btn-revert" style="margin-left: 8px; font-size: 12px; padding: 4px 12px;">↩ Revert to Default</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="card" id="actions-card" style="display: none;">
      <div class="card-header">
        <h2>Actions</h2>
      </div>
      <div class="card-body">
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
          <button class="btn btn-primary" id="btn-export-json">📥 Export as JSON</button>
          <button class="btn btn-primary" id="btn-export-csv">📥 Export as CSV</button>
          <label class="btn btn-outline" style="cursor: pointer;">
            📤 Import JSON
            <input type="file" id="import-json" accept=".json" style="display: none;">
          </label>
          <label class="btn btn-outline" style="cursor: pointer;">
            📤 Import CSV
            <input type="file" id="import-csv" accept=".csv" style="display: none;">
          </label>
        </div>

        <div id="import-preview" style="display: none; margin-top: 16px;">
          <div class="card-header"><h3>Import Preview</h3></div>
          <div id="preview-summary" style="margin: 12px 0;"></div>
          <div id="preview-table-wrap" style="max-height: 400px; overflow-y: auto;"></div>
          <div style="margin-top: 12px; display: flex; gap: 8px;">
            <button class="btn btn-primary" id="btn-confirm-import">✓ Apply to Template</button>
            <button class="btn btn-outline" id="btn-cancel-import">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Current Template Contents -->
    <div class="card" id="contents-card" style="display: none;">
      <div class="card-header">
        <h2>Template Contents</h2>
      </div>
      <div class="card-body" id="template-contents"></div>
    </div>

  </div>

  <script src="js/toolkit-data.js"></script>
  <script src="js/toolkit-manager.js"></script>
</body>
</html>
